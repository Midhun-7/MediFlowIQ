server:
  port: 8080

spring:
  application:
    name: mediflowiq

  # ─────────────────────────────────────────────
  # H2 In-Memory Database (Phase 1 & 2 — Dev Only)
  # ─────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:mediflowiq;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # ─────────────────────────────────────────────
  # PostgreSQL (Phase 3+ — Uncomment below and
  # comment out the H2 block above to switch)
  # ─────────────────────────────────────────────
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/mediflowiq
  #   username: postgres
  #   password: your_password
  #   driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # auto creates schema on start (use 'validate' in prod)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        # For PostgreSQL Phase 3: org.hibernate.dialect.PostgreSQLDialect

  # ── Scheduling thread pool for ambulance simulation ───────────────
  task:
    scheduling:
      pool:
        size: 5

logging:
  level:
    com.mediflowiq: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.security: INFO

# ─────────────────────────────────────────────
# Phase 4 — JWT Security Configuration
# ─────────────────────────────────────────────
app:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration-ms: 3600000       # 1 hour
    refresh-expiration-ms: 86400000  # 24 hours
